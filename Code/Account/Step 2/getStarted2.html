<!DOCTYPE html>
<html lang="en">
<head>

    <title>Netflix - Check Your Inbox</title>
    <link rel="stylesheet" href="getStarted2.css">
</head>
<body>
    <div class="page-container">
        <header class="navbar">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix" class="logo">
            <a href="../Login/login.html" class="signin-btn">Sign In</a>
        </header>

        <main class="content-area">
            <div class="inbox-card">
                <img src="../../../Pictures/enpimg.png" alt="Email" class="envelope-icon">
                <p class="step-indicator">STEP 1 OF 3</p>
                <h1>Check your inbox</h1>
                <p class="msg">We sent a sign-up link to <strong id="userEmail"></strong>. <br> Tap the link in the email to finish setting up your account.</p>
                
                <button class="primary-btn">Resend Link</button>
                <button class="secondary-btn"><a href="../get member ship to create account/memberShip.html" style="color: black; text-decoration: none;">Create Password Instead</a></button>
            </div>
        </main>

        <footer class="footer">
            <p>Questions? <a href="../../Footer links/Contact us/contactUs.html" style="color: grey; text-decoration: none;">Contact us</a>.</p>
            <div class="footer-links">
                <a href="../../Footer links/FAQ/FAQ.html">FAQ</a>
                <a href="../../Footer links/Help Center/helpCenter.html">Help Center</a>
                <a href="../../Footer links/Trem and condition/termCondition.html">Terms of Use</a>
                <a href="../../Footer links/Privacy/privacy.html">Privacy</a>
                <a href="#">Cookie Preferences</a>
                <a href="../../Footer links/Corporate Information/Corporate_Information.html">Corporate Information</a>

        </footer>
