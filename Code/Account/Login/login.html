<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Sign In</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-wrapper">
        <header class="login-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix"
                class="logo">
        </header>

        <main class="login-main">
            <div class="login-box">
                <h1>Sign In</h1>
                <form id="loginForm">
                    <div class="input-container">
                        <input type="text" id="user-info" placeholder="Email or mobile number" required>
                    </div>
                    <div class="input-container">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-signin-red">Sign In</button>

                    <p class="or-text">OR</p>
                    <button type="button" class="btn-code">Use a Sign-In Code</button>

                    <a href="../Forget password/forgetPassword.html" class="forgot-link">Forgot password?</a>

                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>

                    <p class="signup-now">New to Netflix? <a href="../../signin/SignButton.Netflix.html">Sign up now.</a></p>

                    <p class="recaptcha-text">
                        This page is protected by Google reCAPTCHA to ensure you're not a bot.
                        <a href="#">Learn more.</a>
                    </p>
                </form>
            </div>
        </main>

        <footer class="login-footer">
            <p>Questions? <a href="../../Footer links/Contact us/contactUs.html" style="color: grey; text-decoration: none;">Contact us</a>.</p>
            <div class="footer-grid">
                <a href="../../Footer links/FAQ/FAQ.html">FAQ</a>
                <a href="../../Footer links/Help Center/helpCenter.html">Help Center</a>
                <a href="../../Footer links/Trem and condition/termCondition.html">Terms of Use</a>
                <a href="../../Footer links/Privacy/privacy.html">Privacy</a>
                <a href="#">Cookie Preferences</a>
                <a href="../../Footer links/Corporate Information/Corporate_Information.html">Corporate Information</a>
            </div>
        </footer>
    </div>
</body>

</html>
