<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Create Password</title>
    <link rel="stylesheet" href="memberShip.css">
</head>

<body>
    <div class="page-container">
        <header class="navbar">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix"
                class="logo">
            <a href="../../signin/SignButton.Netflix.html" class="signin-btn">Sign In</a>
        </header>

        <main class="content-area">
            <div class="password-box">
                <p class="step-indicator">STEP 1 OF 3</p>
                <h1>Create a password to start your membership</h1>
                <p class="sub-text">Just a few more steps and you're done!<br>We hate paperwork, too.</p>

                <form id="completeRegistrationForm">
                    <div class="input-group">
                        <input type="email" id="displayEmail" placeholder="Email" required>
                    </div>

                    <div class="input-group">
                        <input type="password" id="newPassword" placeholder="Add a password" required>
                    </div>

                    <label class="checkbox-container">
                        <input type="checkbox">
                        <span>Please do not email me Netflix special offers.</span>
                    </label>

                    <button type="submit" class="next-btn">Next</button>
                </form>
            </div>
        </main>

        <footer class="footer">
            <p>Questions?<a href="../../Footer links/Contact us/contactUs.html" style="color: grey; text-decoration: none;">Contact us</a>.</.</p>
            <div class="footer-grid">
                <a href="../../Footer links/FAQ/FAQ.html">FAQ</a>
                <a href="../../Footer links/Help Center/helpCenter.html">Help Center</a>
                <a href="../../Footer links/Trem and condition/termCondition.html">Terms of Use</a>
                <a href="../../Footer links/Privacy/privacy.html">Privacy</a>
                <a href="#">Cookie Preferences</a>
                <a href="../../Footer links/Corporate Information/Corporate_Information.html">Corporate Information</a>
            </div>
        </footer>
    </div>
    <script src="memberShip.js"></script>
</body>

</html>
