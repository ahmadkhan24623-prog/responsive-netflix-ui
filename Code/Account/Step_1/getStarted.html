<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Signup</title>
    <link rel="stylesheet" href="getStarted.css">
</head>

<body>
    <div class="page-wrapper">
        <header class="signup-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix"
                class="logo">
            <a href="../Login/login.html" class="signin-link">Sign In</a>
        </header>

        <main class="signup-main">
            <div class="setup-container">
                <img src="https://assets.nflxext.com/ffe/siteui/acquisition/simplicity/Devices.png" alt="Devices"
                    class="devices-img">
                <p class="step">STEP 1 OF 3</p>
                <h1>Finish setting up your account</h1>
                <p class="desc">We'll send a sign-up link to <strong id="userEmail"></strong> so you can use Netflix
                    without a password.</p>

                <form id="setupForm">
                    <div class="checkbox-row">
                        <input type="checkbox" id="offers">
                        <label for="offers">Please do not email me Netflix special offers.</label>
                    </div>
                    <!-- <button type="submit" class="btn-next"><a href="getStarted2.html" style="color: white; text-decoration: none;">Next</a></button> -->
                    <button type="submit" class="btn-next">Next</button>
                </form>
            </div>
        </main>

        <footer class="signup-footer">
            <p><a href="#">Questions? <a href="../../Footer links/Contact us/contactUs.html" style="color: grey; text-decoration: none;">Contact us</a>.</.</a></p>
            <div class="footer-grid">
                <a href="../../Footer links/FAQ/FAQ.html">FAQ</a>
                <a href="../../Footer links/Help Center/helpCenter.html">Help Center</a>
                <a href="../../Footer links/Trem and condition/termCondition.html">Terms of Use</a>
                <a href="../../Footer links/Privacy/privacy.html">Privacy</a>
                <a href="#">Cookie Preferences</a>
                <a href="../../Footer links/Corporate Information/Corporate_Information.html">Corporate Information</a>
            </div>
        </footer>
    </div>
    <script src="getStarted.js"></script>
</body>

</html>
